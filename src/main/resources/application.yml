spring:
  profiles:
    active: dev

---

spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/notepad
    username: postgres
    password: postgres
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL94Dialect
  thymeleaf:
    cache: false
  messages:
    cache-seconds: 0
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

---

test_mysql_host: ${ENV_TEST_MYSQL_HOST:localhost}

spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:postgresql://${test_mysql_host}:5432/notepad
    username: postgres
    password: postgres
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL94Dialect
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

---

spring:
  config:
    activate:
      on-profile: testing
  datasource:
    url: ${testing_datasource_url}
    username: ${testing_datasource_username}
    password: ${testing_datasource_password}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL94Dialect
  flyway:
    enabled: true

logging:
  config: /etc/notepad/logback-spring.xml

management:
  endpoints:
    web:
      exposure:
        include: "*"

---

spring:
